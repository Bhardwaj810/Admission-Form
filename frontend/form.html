<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission Form</title>
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <a href="index.html" id="home" class="btn">Back</a>

    <h1>Admission Open</h1>

    <div class="container">
      <form id="admissionForm">
        <label for="name">Student Name:</label>
        <input
          type="text"
          id="name"
          name="student_name"
          placeholder="Enter Student Name"
          required
        />

        <label for="number">Mobile No. :</label>
        <input
          type="tel"
          id="phone"
          name="student_phone"
          placeholder="Enter Student Mobile No."
          pattern="[0-9]{10}"
          maxlength="10"
          required
        />

        <div id="address">
          <label for="state"></label>
          <select id="state" name="state" required>
            <option value="">--Select State--</option>
            <option value="Andaman and Nicobar">Andaman and Nicobar</option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
            <option value="Asam">Asam</option>
            <option value="Bihar">Bihar</option>
            <option value="Chandigarh">Chandigarh</option>
            <option value="Chhattisgarh">Chhattisgarh</option>
            <option value="Dadra and Naga Haveli">Dadra and Naga Haveli</option>
            <option value="Daman and Diu">Daman and Diu</option>
            <option value="Delhi">Delhi</option>
            <option value="Goa">Goa</option>
            <option value="Gujrat">Gujrat</option>
            <option value="Haryana">Haryana</option>
            <option value="Himachal Pradesh">Himachal Pradesh</option>
            <option value="Jmmu and Kshmir">Jmmu and Kshmir</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Kerala">Kerala</option>
            <option value="Ladekh">Ladekh</option>
            <option value="Lakshadweep">Lakshadweep</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Mainpur">Mainpur</option>
            <option value="Mizoram">Mizoram</option>
            <option value="Nagaland">Nagaland</option>
            <option value="Odisa">Odisa</option>
            <option value="Puducherry">Puducherry</option>
            <option value="Punjab">Punjab</option>
            <option value="Rajsthan">Rajsthan</option>
            <option value="Sikkim">Sikkim</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Telangana">Telangana</option>
            <option value="Tripura">Tripura</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Uttrakhand">Uttrakhand</option>
            <option value="West Bengal">West Bengal</option>
          </select>

          <label for="city"></label>
          <input
            type="text"
            id="city"
            name="city"
            placeholder="Enter City"
            required
          />
        </div>

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="student_email"
          placeholder="Enter Student Email"
          required
        />
        <label for="course">Course:</label>
        <select id="course" name="course" required>
          <option value="">--Select Course--</option>
          <option value="B.Tech">B.Tech.</option>
          <option value="BCA">BCA</option>
          <option value="BBA">BBA</option>
          <option value="LL.B">LL.B</option>
          <option value="B.A.LL.B">B.A.LL.B</option>
          <option value="B.Sc.">B.S.c</option>
          <option value="B.Ed.">B.Ed.</option>
          <option value="D.El.Ed.">D.El.Ed.</option>
          <option value="M.Tech.">M.Tech.</option>
          <option value="MCA">MCA</option>
          <option value="MBA">MBA</option>
          <option value="M.Ed.">M.Ed.</option>
          <option value="M.Sc.">M.Sc.</option>
          <option value="M.Pharma.">M.Pharma.</option>
          <option value="B.Pharma.">B.Pharma.</option>
          <option value="D.Pharma.">D.Phrma.</option>
        </select>

        <button type="submit">Submit Admission</button>
      </form>
    </div>
    <script>
      const form = document.getElementById("admissionForm");
      const API_BASE_URL = "http://localhost:5000";

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const phone = document.getElementById("phone").value.trim();
        if (!/^\d{10}$/.test(phone)) {
          alert("Please enter a valid 10-digit mobile number.");
          return;
        }

        const formData = {
          student_name: document.getElementById("name").value.trim(),
          student_phone: phone,
          state: document.getElementById("state").value.trim(),
          city: document.getElementById("city").value.trim(),
          student_email: document.getElementById("email").value.trim(),
          course: document.getElementById("course").value.trim(),
        };

        try {
          const response = await fetch(`${API_BASE_URL}/api/admission/submit`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            alert("Admission submitted successfully.");
            form.reset();
          } else {
            alert(data.message || "Error submitting form.");
          }
        } catch (error) {
          console.error(error);
          alert("Cannot connect to server. Please try again.");
        }
      });
    </script>
  </body>
</html>
